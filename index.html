<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈墨阳 | 全栈工程师 & 数字创作者</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --dark: #1A1A1A;
            --light: #F5F5F5;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--dark);
            color: var(--light);
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* 三维悬浮效果 */
        .card-3d {
            transform: perspective(1000px) rotateY(var(--rotateY)) rotateX(var(--rotateX));
            transform-style: preserve-3d;
        }

        /* 动态网格布局 */
        .dynamic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 4rem 10%;
        }

        /* 项目展示卡片 */
        .project-card {
            background: linear-gradient(45deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                var(--primary),
                transparent 30%
            );
            animation: rotate 4s linear infinite;
        }

        /* 时间线样式 */
        .timeline {
            position: relative;
            padding: 4rem 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            height: 100%;
            width: 2px;
            background: var(--primary);
        }

        /* 交互式技能图表 */
        .skill-meter {
            --progress: 0;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: 
                radial-gradient(closest-side, var(--dark) 80%, transparent 81%),
                conic-gradient(var(--primary) calc(var(--progress)*1%), transparent 0);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 三维交互区 -->
    <section class="hero" id="hero">
        <canvas id="webgl-canvas"></canvas>
        <div class="hero-content">
            <h1>代码即艺术</h1>
            <div class="typewriter">
                <p>全栈开发者 | 技术艺术家 | 创新追求者</p>
            </div>
        </div>
    </section>

    <!-- 项目展示墙 -->
    <section class="dynamic-grid" id="projects">
        <article class="project-card">
            <div class="card-content">
                <h3>智能城市可视化</h3>
                <div class="tech-stack">
                    <span>Three.js</span>
                    <span>WebGL</span>
                    <span>Node.js</span>
                </div>
                <p class="description">实时城市数据三维可视化平台...</p>
                <a href="#" class="project-link">查看案例</a>
            </div>
            <div class="project-preview">
                <img src="project1.jpg" alt="项目预览">
            </div>
        </article>
    </section>

    <!-- 技能矩阵 -->
    <section class="skill-matrix">
        <div class="skill-meter" style="--progress: 85">
            <span>JavaScript</span>
        </div>
        <!-- 更多技能项 -->
    </section>

    <!-- 动态时间线 -->
    <section class="timeline">
        <div class="timeline-item">
            <div class="timeline-content">
                <h4>2023 - 至今</h4>
                <p>XX科技 高级全栈工程师</p>
            </div>
        </div>
        <!-- 更多时间线节点 -->
    </section>

    <!-- 交互式联系表单 -->
    <section class="contact-form">
        <form id="contact" netlify>
            <div class="input-group">
                <input type="text" required>
                <label>姓名</label>
                <div class="underline"></div>
            </div>
            <!-- 更多表单字段 -->
            <button type="submit">发送信息</button>
        </form>
    </section>

    <script type="module">
        // 实现WebGL背景
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        
        // 初始化3D场景
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#webgl-canvas') });

        // 创建动态几何体
        const geometry = new THREE.IcosahedronGeometry(3, 2);
        const material = new THREE.MeshPhongMaterial({ 
            color: 0xFF6B6B,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.x += 0.01;
            mesh.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
