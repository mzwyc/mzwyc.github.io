<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #f9f9f9;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px 0;
        }

        header {
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 15px 0;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #007bff;
        }

        .hero {
            text-align: center;
            padding: 60px 0;
            background-color: #fff;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            color: #666;
            max-width: 700px;
            margin: 0 auto 30px;
        }

        .btn {
            display: inline-block;
            background-color: #007bff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .featured-post {
            background-color: #fff;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .posts {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .post {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .post h3 {
            margin-top: 0;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            background-color: #333;
            color: #fff;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">我的博客</div>
                <ul class="nav-links">
                    <li><a href="#home">首页</a></li>
                    <li><a href="#about">关于</a></li>
                    <li><a href="#contact">联系</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>欢迎来到我的博客</h1>
            <p>在这里，我将分享我的思考、经验和学习心得，希望对你有所帮助。</p>
            <a href="#posts" class="btn">阅读最新文章</a>
        </div>
    </section>

    <section id="posts" class="container">
        <div class="featured-post">
            <h2>特色文章</h2>
            <h3>如何学习编程</h3>
            <p>学习编程可能会让人感到有些挑战，但通过正确的方法和坚持不懈的努力，任何人都可以掌握它。在这篇文章中，我将分享一些我在学习编程过程中总结出的有效方法和技巧。</p>
            <a href="article.html?id=1" class="btn">阅读全文</a>
        </div>

        <div class="posts" id="posts-list">
            <!-- 文章列表将通过JavaScript动态加载 -->
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2023 我的博客. 保留所有权利.</p>
        </div>
    </footer>

    <script>
        fetch('articles.json')
            .then(response => response.json())
            .then(articles => {
                const postsList = document.getElementById('posts-list');
                articles.forEach(article => {
                    const postElement = document.createElement('div');
                    postElement.className = 'post';
                    postElement.innerHTML = `
                        <h3>${article.title}</h3>
                        <p>${article.content}</p>
                        <a href="article.html?id=${article.id}" class="btn">阅读全文</a>
                    `;
                    postsList.appendChild(postElement);
                });
            })
            .catch(error => console.error('Error loading the articles:', error));
    </script>
</body>
</html>
